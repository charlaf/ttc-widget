<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TTC Subway Status</title>
<style>
  /* ---- Config knob: point this at your own alerts.json on GitHub Pages ---- */
  /* Set in JS below via ALERTS_URL. */

  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-edge: #23262f;
    --ink: #f4f5f7;
    --ink-dim: #9aa0ad;
    --ink-faint: #626775;
    --ok: #37b24d;
    --warn: #f0a500;
    --bad: #e8503a;
    /* Official TTC line colours */
    --line1: #f8c300;
    --line2: #00923f;
    --line3: #0082c9;
    --line4: #a21a68;
    --line5: #f26a21;
    --line6: #6a3fa0;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .board {
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--panel-edge);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Header reads like a signage strip */
  .strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background:
      repeating-linear-gradient(
        -45deg,
        #1b1d25 0 10px,
        #191b22 10px 20px
      );
    border-bottom: 1px solid var(--panel-edge);
  }

  .strip h1 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink);
  }
  .strip h1 span { color: var(--ink-faint); font-weight: 600; }

  .pulse {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-faint);
    box-shadow: 0 0 0 0 rgba(55,178,77,0.5);
  }
  .dot.live {
    background: var(--ok);
    animation: ping 2.4s ease-out infinite;
  }
  @keyframes ping {
    0%   { box-shadow: 0 0 0 0 rgba(55,178,77,0.45); }
    70%  { box-shadow: 0 0 0 7px rgba(55,178,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(55,178,77,0); }
  }

  /* Overall status banner */
  .summary {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 16px;
    border-bottom: 1px solid var(--panel-edge);
  }
  .summary .badge {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 10px;
    display: grid; place-items: center;
    font-weight: 800; font-size: 20px;
  }
  .summary.good .badge { background: rgba(55,178,77,0.14); color: var(--ok); }
  .summary.warn .badge { background: rgba(240,165,0,0.14); color: var(--warn); }
  .summary.bad  .badge { background: rgba(232,80,58,0.14); color: var(--bad); }
  .summary .label { font-size: 15px; font-weight: 650; }
  .summary .sub { font-size: 12.5px; color: var(--ink-dim); margin-top: 2px; }

  /* Alert rows */
  .rows { padding: 6px 8px 10px; }
  .row {
    display: grid;
    grid-template-columns: 4px 1fr;
    gap: 12px;
    padding: 12px 8px;
    border-radius: 10px;
  }
  .row + .row { border-top: 1px solid var(--panel-edge); }
  .row .rail { border-radius: 4px; background: var(--ink-faint); }

  .row .content { min-width: 0; }
  .lines { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 999px;
    color: #0b0c10; background: var(--ink-dim);
    letter-spacing: 0.02em;
  }
  .chip .num {
    display: inline-grid; place-items: center;
    width: 15px; height: 15px; border-radius: 50%;
    background: rgba(0,0,0,0.28); color: #fff; font-size: 10px;
  }
  .chip.l1 { background: var(--line1); }
  .chip.l2 { background: var(--line2); color: #fff; }
  .chip.l3 { background: var(--line3); color: #fff; }
  .chip.l4 { background: var(--line4); color: #fff; }
  .chip.l5 { background: var(--line5); color: #fff; }
  .chip.l6 { background: var(--line6); color: #fff; }

  .row .head { font-size: 14px; font-weight: 620; line-height: 1.35; }
  .row .effect {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em;
    font-weight: 700; color: var(--warn); margin-bottom: 4px;
  }
  .row .desc { font-size: 12.5px; color: var(--ink-dim); line-height: 1.5; margin-top: 5px; }
  .row a.more {
    display: inline-block; margin-top: 7px;
    font-size: 12px; color: #6db3ff; text-decoration: none;
  }
  .row a.more:hover { text-decoration: underline; }

  /* Planned closures section */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 16px 8px;
    border-top: 1px solid var(--panel-edge);
  }
  .section-head .t {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 700; color: var(--ink-dim);
  }
  .section-head .c {
    font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums;
  }
  .planned-row {
    display: grid; grid-template-columns: 4px 1fr; gap: 12px;
    padding: 11px 8px; margin: 0 8px;
  }
  .planned-row + .planned-row { border-top: 1px solid var(--panel-edge); }
  .planned-row .rail { border-radius: 4px; background: var(--ink-faint); opacity: 0.7; }
  .planned-row .when {
    font-size: 11px; font-weight: 700; color: var(--ink);
    letter-spacing: 0.02em; margin-bottom: 5px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .planned-row .when .cal { color: var(--ink-faint); }
  .planned-row .head { font-size: 13.5px; font-weight: 600; line-height: 1.35; }
  .planned-row .desc { font-size: 12px; color: var(--ink-dim); line-height: 1.5; margin-top: 4px; }
  .planned-row .lines { margin-bottom: 6px; }
  .planned-empty {
    padding: 4px 16px 18px; font-size: 12.5px; color: var(--ink-dim); line-height: 1.5;
  }

  .empty {
    padding: 26px 16px 30px; text-align: center;
  }
  .empty .big { font-size: 15px; font-weight: 650; color: var(--ok); }
  .empty .small { font-size: 12.5px; color: var(--ink-dim); margin-top: 6px; line-height: 1.5; }

  .foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 10px 16px;
    border-top: 1px solid var(--panel-edge);
    font-size: 11px; color: var(--ink-faint);
  }
  .foot a { color: var(--ink-faint); text-decoration: none; border-bottom: 1px dotted var(--ink-faint); }
  .foot button {
    background: transparent; border: 1px solid var(--panel-edge);
    color: var(--ink-dim); border-radius: 8px;
    font-size: 11px; padding: 5px 10px; cursor: pointer;
    font-family: inherit;
  }
  .foot button:hover { color: var(--ink); border-color: var(--ink-faint); }
  .foot button:focus-visible { outline: 2px solid #6db3ff; outline-offset: 2px; }

  .skeleton { color: var(--ink-faint); padding: 24px 16px; text-align: center; font-size: 13px; }

  @media (prefers-reduced-motion: reduce) {
    .dot.live { animation: none; }
  }
</style>
</head>
<body>
  <div class="board" role="region" aria-label="TTC subway service status">
    <div class="strip">
      <h1>TTC Subway <span>· live status</span></h1>
      <div class="pulse"><span class="dot" id="dot"></span><span id="clock">—</span></div>
    </div>
    <div id="app">
      <div class="skeleton">Loading service alerts…</div>
    </div>
    <div class="foot">
      <span>Source: TTC realtime feed · <a id="official" href="https://www.ttc.ca/service-alerts" target="_blank" rel="noopener">ttc.ca</a></span>
      <button id="refresh" type="button">Refresh</button>
    </div>
  </div>

<script>
  // ============================================================
  // 1. POINT THIS AT YOUR OWN alerts.json ON GITHUB PAGES.
  //    e.g. https://YOURNAME.github.io/ttc-widget/alerts.json
  //    Using a relative path works if the widget and alerts.json
  //    are served from the same repo/site (recommended).
  // ============================================================
  const ALERTS_URL = "./alerts.json";
  const POLL_MS = 60 * 1000; // re-check every 60s

  const LINE_META = {
    "Line 1 Yonge-University": { n: "1", cls: "l1" },
    "Line 2 Bloor-Danforth":   { n: "2", cls: "l2" },
    "Line 3 Scarborough":      { n: "3", cls: "l3" },
    "Line 4 Sheppard":         { n: "4", cls: "l4" },
    "Line 5 Eglinton":         { n: "5", cls: "l5" },
    "Line 6 Finch West":       { n: "6", cls: "l6" },
  };
  const LINE_VAR = { l1:"--line1", l2:"--line2", l3:"--line3", l4:"--line4", l5:"--line5", l6:"--line6" };

  const app = document.getElementById("app");
  const dot = document.getElementById("dot");
  const clock = document.getElementById("clock");

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function timeAgo(iso) {
    if (!iso) return "unknown";
    const then = new Date(iso).getTime();
    const secs = Math.max(0, Math.round((Date.now() - then) / 1000));
    if (secs < 60) return secs + "s ago";
    const mins = Math.round(secs / 60);
    if (mins < 60) return mins + "m ago";
    const hrs = Math.round(mins / 60);
    return hrs + "h ago";
  }

  function fmtWhen(startIso, endIso) {
    if (!startIso) return "Upcoming";
    const opts = { weekday: "short", month: "short", day: "numeric" };
    const start = new Date(startIso);
    const startStr = start.toLocaleDateString("en-CA", opts);
    if (!endIso) return startStr;
    const end = new Date(endIso);
    // Same calendar day -> show one date; else a range.
    const sameDay = start.toDateString() === end.toDateString();
    if (sameDay) return startStr;
    const endStr = end.toLocaleDateString("en-CA", opts);
    return startStr + " – " + endStr;
  }

  function chip(line) {
    const meta = LINE_META[line];
    if (!meta) return '<span class="chip">' + esc(line) + '</span>';
    return '<span class="chip ' + meta.cls + '"><span class="num">' + meta.n + '</span>' +
           esc(line.replace(/^Line \d+ /, "")) + '</span>';
  }

  function railColor(lines) {
    for (const l of lines) {
      const meta = LINE_META[l];
      if (meta) return "var(" + LINE_VAR[meta.cls] + ")";
    }
    return "var(--warn)";
  }

  function render(data) {
    const alerts = (data && data.alerts) || [];
    const planned = (data && data.planned) || [];
    const windowDays = (data && data.windowDays) || 7;
    const updated = data && data.updatedAt;

    let summaryClass, badge, label, sub;
    if (data && data.fetchError && alerts.length === 0 && planned.length === 0) {
      summaryClass = "warn"; badge = "!";
      label = "Couldn't reach the feed";
      sub = "Showing last known state. The TTC page has the latest.";
    } else if (alerts.length === 0) {
      summaryClass = "good"; badge = "✓";
      label = "Good service on all lines";
      sub = planned.length
        ? "No active alerts. " + planned.length + " planned closure" + (planned.length === 1 ? "" : "s") + " ahead."
        : "No active subway or LRT alerts reported.";
    } else {
      const hasNoService = alerts.some(a => /no service|closure|closed|suspend/i.test((a.effect||"") + " " + (a.header||"")));
      summaryClass = hasNoService ? "bad" : "warn";
      badge = hasNoService ? "✕" : "!";
      const n = alerts.length;
      label = n + (n === 1 ? " active alert" : " active alerts");
      sub = hasNoService ? "Includes a closure or service suspension." : "Delays or diversions in effect.";
    }

    let html = '';
    html += '<div class="summary ' + summaryClass + '">';
    html +=   '<div class="badge">' + badge + '</div>';
    html +=   '<div><div class="label">' + esc(label) + '</div><div class="sub">' + esc(sub) + '</div></div>';
    html += '</div>';

    if (alerts.length === 0 && !(data && data.fetchError)) {
      html += '<div class="empty">';
      html +=   '<div class="big">All clear</div>';
      html +=   '<div class="small">No active delays or closures on the subway or LRT right now.</div>';
      html += '</div>';
    } else {
      html += '<div class="rows">';
      for (const a of alerts) {
        const lines = a.lines && a.lines.length ? a.lines : [];
        html += '<div class="row">';
        html +=   '<div class="rail" style="background:' + railColor(lines) + '"></div>';
        html +=   '<div class="content">';
        if (lines.length) {
          html += '<div class="lines">' + lines.map(chip).join("") + '</div>';
        }
        if (a.effect) html += '<div class="effect">' + esc(a.effect) + '</div>';
        html +=     '<div class="head">' + esc(a.header || "Service alert") + '</div>';
        if (a.description) html += '<div class="desc">' + esc(a.description) + '</div>';
        if (a.url) html += '<a class="more" href="' + esc(a.url) + '" target="_blank" rel="noopener">Details ↗</a>';
        html +=   '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    // ---- Planned closures (next N days) ----
    html += '<div class="section-head">';
    html +=   '<span class="t">Planned · next ' + windowDays + ' days</span>';
    html +=   '<span class="c">' + planned.length + (planned.length === 1 ? " closure" : " closures") + '</span>';
    html += '</div>';

    if (planned.length === 0) {
      html += '<div class="planned-empty">No planned subway or LRT closures announced for the coming week. Weekend track-work closures are usually posted a few days ahead.</div>';
    } else {
      for (const p of planned) {
        const lines = p.lines && p.lines.length ? p.lines : [];
        html += '<div class="planned-row">';
        html +=   '<div class="rail" style="background:' + railColor(lines) + '"></div>';
        html +=   '<div class="content">';
        html +=     '<div class="when"><span class="cal">◷</span>' + esc(fmtWhen(p.startsAt, p.endsAt)) + '</div>';
        if (lines.length) html += '<div class="lines">' + lines.map(chip).join("") + '</div>';
        html +=     '<div class="head">' + esc(p.header || "Planned closure") + '</div>';
        if (p.description) html += '<div class="desc">' + esc(p.description) + '</div>';
        if (p.url) html += '<a class="more" href="' + esc(p.url) + '" target="_blank" rel="noopener">Details ↗</a>';
        html +=   '</div>';
        html += '</div>';
      }
    }

    app.innerHTML = html;
    clock.textContent = "updated " + timeAgo(updated);
    dot.classList.toggle("live", !(data && data.fetchError));
  }

  function renderError(msg) {
    app.innerHTML = '<div class="summary warn"><div class="badge">!</div>' +
      '<div><div class="label">Status unavailable</div>' +
      '<div class="sub">' + esc(msg) + '</div></div></div>';
    dot.classList.remove("live");
    clock.textContent = "—";
  }

  async function load() {
    try {
      // cache-bust so Notion/GitHub Pages don't serve a stale copy
      const res = await fetch(ALERTS_URL + "?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("Data file returned " + res.status);
      const data = await res.json();
      render(data);
    } catch (err) {
      renderError("Check that alerts.json is published and ALERTS_URL is correct.");
      console.error(err);
    }
  }

  document.getElementById("refresh").addEventListener("click", load);
  load();
  setInterval(load, POLL_MS);
  // keep the "updated Xs ago" label ticking even between polls
  setInterval(() => {
    // no-op re-render of just the clock is overkill; load() covers freshness
  }, 15000);
</script>
</body>
</html>
